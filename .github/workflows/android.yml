name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-RapidDrop-v2.6.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-RapidDrop-v2.6-APK
          path: PumpSignal-RapidDrop-v2.6.apk
          retention-days: 30

      - name: Publish v2.6 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.6
          name: PUMP Сигнал v2.6 — Аварийное падение и недельный ритм
          prerelease: true
          body: |
            Добавлена отдельная аварийная тревога при падении PUMP/EUR на 25% и больше от максимума последних 24 часов. Текущая цена берётся из небольшого публичного ticker-запроса, поэтому тревога не ждёт закрытия 30-минутной свечи.
            Красная плашка показывает точный процент, максимум, текущую цену и состояние отскока. Падение не считается командой купить: до подтверждённого восстановления обычный сигнал покупки блокируется. Повторный звонок подаётся при более глубоком уровне 35/50/65/80%; повтор того же уровня ограничен паузой 12 часов.
            Добавлен недельный контекст: более тихие выходные, возможный утренний откат в понедельник 06–12 и исторически более слабый четверг. Календарь не создаёт и не отменяет сделку самостоятельно.
            Аварийная тревога подчиняется выбранному расписанию звонка. Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-RapidDrop-v2.6.apk
