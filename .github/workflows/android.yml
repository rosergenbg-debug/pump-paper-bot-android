name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-MarketBreathing-v2.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-MarketBreathing-v2.0-APK
          path: PumpSignal-MarketBreathing-v2.0.apk
          retention-days: 30

      - name: Publish v2.0 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0
          name: PUMP Сигнал v2.0 — Дыхание рынка
          prerelease: true
          body: |
            Добавлен причинный анализ состояния PUMP: активность/сжатие, направление потока, согласованность данных и отдельный риск позднего входа. Высокий риск по самому PUMP блокирует покупку, даже если прежняя готовность стратегии приблизилась к 99 и BTC/SOL не перегреты.
            Добавлены публичный снимок стакана Binance, открытый интерес PUMP futures и локальный исследовательский журнал. Эти данные пока используются осторожно: они уточняют состояние, но не являются самостоятельным приказом купить.
            Профили «Осторожный» и «Активный», вертикальный исторический график, точки и связи сделок сохранены. Звонок на 99 работает только при допустимом риске позднего входа и достаточной согласованности доступных данных.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-MarketBreathing-v2.0.apk
