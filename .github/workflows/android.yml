name: Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APK
        run: gradle assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-Visual-v1.6.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-Visual-v1.6-APK
          path: PumpSignal-Visual-v1.6.apk
          retention-days: 30

      - name: Publish v1.6 release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.6
          name: PUMP Сигнал v1.6
          prerelease: true
          body: |
            Вертикальный график с крупными синими стрелками входа/выхода, навигацией по точкам, масштабом и отдельной шкалой ±100. Звонок на готовности 99 с рабочим расписанием или режимом 24 часа.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-Visual-v1.6.apk
