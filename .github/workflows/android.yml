name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-ClearLiveEdge-v2.4.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-ClearLiveEdge-v2.4-APK
          path: PumpSignal-ClearLiveEdge-v2.4.apk
          retention-days: 30

      - name: Publish v2.4 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.4
          name: PUMP Сигнал v2.4 — Свободный живой край
          prerelease: true
          body: |
            Метки ВЕРХ, НИЗ и СЕЙЧАС перенесены с правого живого края на левую сторону графика. Последние свечи и текущее движение PUMP/EUR справа теперь полностью открыты.
            Фон ценовых меток стал менее плотным. Текущая пунктирная линия сохранена, а метка СЕЙЧАС автоматически отступает от верхней и нижней меток, чтобы они не накладывались друг на друга.
            Торговые формулы, исторические результаты, профили, пороги входа/выхода, звонок на 99, защита от позднего входа и экономный режим загрузки не изменены.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-ClearLiveEdge-v2.4.apk
