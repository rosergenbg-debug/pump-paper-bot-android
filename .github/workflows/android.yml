name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-V3-FreeRadar-v3.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-V3-FreeRadar-v3.0-APK
          path: PumpSignal-V3-FreeRadar-v3.0.apk
          retention-days: 30

      - name: Publish v3.0 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0
          name: PUMP Сигнал v3.0 — бесплатный радар официальных событий
          prerelease: true
          body: |
            Добавлен бесплатный V3 Радар: небольшие обновления из официальных лент ФРС, ЕЦБ, SEC и BLS проверяются не чаще одного раза в 10 минут. HTTP-кэш не перекачивает неизменившиеся ленты; дополнительно действует предел 768 КБ на ответ и 8 МБ в сутки для радара.
            Радар показывает важность, возможное направление и подтверждение текущим дыханием рынка. Он работает в безопасном режиме наблюдения и самостоятельно не создаёт покупку или продажу.
            Необязательный бесплатный ключ Gemini можно ввести прямо в приложении. Без ключа работает прозрачная оценка по правилам. Ключ не сохраняется в GitHub.
            Сохранены алгоритм v2.6, аварийная тревога 25%+, недельный контекст, комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-V3-FreeRadar-v3.0.apk
