name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build APK
        run: gradle assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-MarketGuard-v1.9.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-MarketGuard-v1.9-APK
          path: PumpSignal-MarketGuard-v1.9.apk
          retention-days: 30

      - name: Publish v1.9 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.9
          name: PUMP Сигнал v1.9
          prerelease: true
          body: |
            Перед покупкой добавлена защита от погони за общерыночной вершиной: приложение сравнивает часовой рост и объём PUMP, BTC и SOL только с предыдущими 30 днями. Если все три актива одновременно перегреты, текущий вход отменяется и пересчитывается после следующей закрытой свечи.
            Профили называются «Осторожный» и «Активный». Проверка назад показывает, сколько входов остановил защитный фильтр. Исторический график сделок с фиолетовыми связями, результатом и временем позиции сохранён.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-MarketGuard-v1.9.apk
