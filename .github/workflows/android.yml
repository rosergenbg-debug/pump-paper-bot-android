name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-VisualBacktest-v2.5.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-VisualBacktest-v2.5-APK
          path: PumpSignal-VisualBacktest-v2.5.apk
          retention-days: 30

      - name: Publish v2.5 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.5
          name: PUMP Сигнал v2.5 — Наглядная честная проверка
          prerelease: true
          body: |
            Историческая проверка теперь моделирует ручное исполнение: решение принимается после закрытия 30-минутной свечи, а покупка или продажа учитывается по открытию следующей свечи с проскальзыванием 0,05%.
            Исправлен лимит удержания: 48 свечей означают ровно 24 часа, 96 свечей — ровно 48 часов. В live-режиме лимит сверяется с фактическим временем. Просадка считается по внутрисвечным минимумам открытой позиции, а не только по закрытым сделкам.
            Навигация на большом графике листает целые сделки. Каждый шаг автоматически помещает в окно вход, частичную фиксацию и окончательный выход. Добавлена кнопка с критериями входа и выхода.
            Экран результата получил крупный процент, карточки сделок и скрываемый технический журнал. Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-VisualBacktest-v2.5.apk
