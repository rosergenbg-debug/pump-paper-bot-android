name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-V3-Info-Score-v3.2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-V3-Info-Score-v3.2-APK
          path: PumpSignal-V3-Info-Score-v3.2.apk
          retention-days: 30

      - name: Publish v3.2 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.2
          name: PUMP Сигнал v3.2 — информационная поправка Gemini
          prerelease: true
          body: |
            Исправлена Android-ошибка XML, из-за которой все RSS-ленты показывали Unknown 0.0. К ФРС, ЕЦБ, SEC и BLS добавлены свежие ленты PUMP, Bitcoin и Solana.
            Исправлен пустой HTTP 200 от Gemini 3: минимальный thinking больше не съедает весь лимит ответа. Ручная проверка возвращает развёрнутый анализ, факты, риски, горизонт и ссылки Google Search.
            На главном экране и в крупной шкале видны три числа: внутренний алгоритм, поправка Gemini и общий фон. Поправка ограничена ±12, уменьшается с возрастом новости и пока не меняет торговые сигналы и backtest.
            Сохранены алгоритм v2.6, аварийная тревога 25%+, лимит 8 МБ в сутки и комиссия 0,15% на каждую сторону. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-V3-Info-Score-v3.2.apk
