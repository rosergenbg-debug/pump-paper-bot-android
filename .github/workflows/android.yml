name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-V3-Gemini-Diagnostics-v3.1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-V3-Gemini-Diagnostics-v3.1-APK
          path: PumpSignal-V3-Gemini-Diagnostics-v3.1.apk
          retention-days: 30

      - name: Publish v3.1 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.1
          name: PUMP Сигнал v3.1 — проверяемая интеграция Gemini
          prerelease: true
          body: |
            Gemini подключён в личной сборке и включён при первом запуске v3.1. Добавлена независимая живая проверка API: приложение показывает HTTP-код, модель, фактически отправленный заголовок, полученное резюме, запросы и токены.
            Для официальных лент ФРС, ЕЦБ, SEC и BLS показываются HTTP 200/304, реальный объём загрузки и количество разобранных сообщений. Неизменившиеся ленты не перекачиваются; действует предел 768 КБ на ответ и 8 МБ в сутки.
            Статус интернета и Gemini виден на главном экране и в крупной шкале потока ±100. Подробная кнопка раскрывает фактические данные, а ошибки больше не скрываются.
            Сохранены алгоритм v2.6, аварийная тревога 25%+, недельный контекст, комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-V3-Gemini-Diagnostics-v3.1.apk
