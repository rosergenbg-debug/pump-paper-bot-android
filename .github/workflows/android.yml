name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-ReadableChart-v2.2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-ReadableChart-v2.2-APK
          path: PumpSignal-ReadableChart-v2.2.apk
          retention-days: 30

      - name: Publish v2.2 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2
          name: PUMP Сигнал v2.2 — Читаемый график
          prerelease: true
          body: |
            Шрифты и отметки на графике увеличены. Завершённая сделка соединяется фиолетовым углом по времени и цене, а не диагональю. На графике постоянно видны верхняя, нижняя и текущая цены шкалы.
            Коснитесь любой свечи: приложение покажет её цену, изменение до последней свечи в процентах и прошедшее время. Кнопка масштаба теперь всегда ясно сообщает следующее действие: увеличить ×2, ещё ×2 или вернуть обзор.
            Торговые формулы, исторические результаты, профили, пороги входа/выхода, звонок на 99, защита от позднего входа и экономный режим загрузки v2.1 не изменены.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-ReadableChart-v2.2.apk
