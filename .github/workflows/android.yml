name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-HoldChart-v2.3.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-HoldChart-v2.3-APK
          path: PumpSignal-HoldChart-v2.3.apk
          retention-days: 30

      - name: Publish v2.3 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.3
          name: PUMP Сигнал v2.3 — График без перекрытия
          prerelease: true
          body: |
            Карточка свечи теперь видна только пока палец удерживается на графике и исчезает сразу после отпускания. Она выводится на противоположной стороне от пальца, чтобы не перекрывать выбранную свечу.
            Большой график получил больше высоты: сокращены повторяющиеся описания, карточка сделки занимает не больше двух строк, нижняя подсказка удалена, а ползунок истории стал компактнее. Текущая цена вне исторического диапазона больше не накладывается на верхнюю или нижнюю цену шкалы.
            Торговые формулы, исторические результаты, профили, пороги входа/выхода, звонок на 99, защита от позднего входа и экономный режим загрузки не изменены.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-HoldChart-v2.3.apk
