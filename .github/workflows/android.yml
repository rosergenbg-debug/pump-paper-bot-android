name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Test and build APK
        run: gradle testDebugUnitTest assembleDebug

      - name: Prepare named APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PumpSignal-IncrementalCache-v2.1.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PumpSignal-IncrementalCache-v2.1-APK
          path: PumpSignal-IncrementalCache-v2.1.apk
          retention-days: 30

      - name: Publish v2.1 release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1
          name: PUMP Сигнал v2.1 — Экономия трафика
          prerelease: true
          body: |
            История рынка теперь загружается один раз и сохраняется в приложении. Во время последующих проверок программа добавляет только новые закрытые свечи; если новая 30-минутная свеча ещё не закрылась, большие запросы истории вообще не выполняются.
            Стакан и открытый интерес продолжают обновляться примерно каждые 2 минуты, потому что это маленькие ответы. Торговые формулы, профили, пороги входа/выхода, звонок на 99 и защита от позднего входа не изменены.
            При обновлении с v2.0 уже сохранённая история используется сразу и повторно не скачивается.
            Комиссия 0,15% на вход и 0,15% на выход. Исторические результаты не гарантируют будущую прибыль.
          files: PumpSignal-IncrementalCache-v2.1.apk
